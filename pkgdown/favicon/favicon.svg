<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1037 1200" role="img" aria-label="vnorm logo">
  <defs>
    <linearGradient id="hex" x1="0" x2="1" y1="0.2" y2="0.8">
      <stop offset="0" stop-color="#B026D9"/>
      <stop offset="0.5" stop-color="#FF2D7A"/>
      <stop offset="1" stop-color="#FF9A1F"/>
    </linearGradient>
    <linearGradient id="torus" x1="0" x2="1">
      <stop offset="0" stop-color="#FF9A1F"/>
      <stop offset="0.55" stop-color="#FF2D7A"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <polygon points="518,30 1007,314 1007,886 518,1170 30,886 30,314" fill="url(#hex)" opacity="0.68"/>
  <polygon points="518,30 1007,314 1007,886 518,1170 30,886 30,314" fill="#000000" opacity="0.46"/>
  <polygon points="518,30 1007,314 1007,886 518,1170 30,886 30,314" fill="none" stroke="#050505" stroke-width="22" stroke-linejoin="round"/>
  <polygon points="518,30 1007,314 1007,886 518,1170 30,886 30,314" fill="none" stroke="#FF3D9A" stroke-width="9" stroke-linejoin="round"/>
  <text x="518" y="282" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="136" font-weight="700" fill="#FF6A52" filter="url(#glow)">vnorm</text>
  <text x="518" y="450" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-style="italic" fill="#FFF4C7" filter="url(#glow)">x ~ N<tspan baseline-shift="sub" font-size="55">p</tspan>(g, &#931;)</text>
  <g filter="url(#glow)">
    <ellipse cx="518" cy="740" rx="340" ry="118" fill="none" stroke="url(#torus)" stroke-width="70" opacity="0.28"/>
    <ellipse cx="518" cy="740" rx="330" ry="110" fill="none" stroke="#FFF4C7" stroke-width="17"/>
    <ellipse cx="518" cy="682" rx="255" ry="86" fill="none" stroke="#FF9A1F" stroke-width="12" opacity="0.92"/>
    <ellipse cx="518" cy="798" rx="255" ry="86" fill="none" stroke="#FF2D7A" stroke-width="12" opacity="0.88"/>
    <ellipse cx="518" cy="740" rx="284" ry="96" fill="none" stroke="url(#torus)" stroke-width="4" stroke-dasharray="4 14" opacity="0.95"/>
  </g>
